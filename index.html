<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anxin Xie - Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <a href="#main-menu" class="skip-link">Direct naar hoofdmenu</a>

    <div class="p3r-homepage-wrapper">
        
        <div class="p3r-volume-control">
            <button id="p3r-volume-toggle" class="p3r-volume-btn" title="Mute/Unmute">
                <span class="volume-icon">🔊</span>
            </button>
            <div class="p3r-slider-container">
                <input type="range" id="p3r-volume-slider" min="0" max="100" value="25" class="p3r-volume-slider">
            </div>
        </div>

        <header class="p3r-profile-box">
            <h1 class="profile-name">Anxin Xie</h1>
            <p class="profile-exp">exp: 2026</p>
        </header>

        <main class="p3r-main-content">
            <nav id="main-menu">
                <ul class="p3r-menu-list">
                    <li><a href="#about" class="p3r-menu-item active">ABOUT ME</a></li>
                    <li><a href="#projects" class="p3r-menu-item">PROJECTS</a></li>
                    <li><a href="#resume" class="p3r-menu-item">RESUME</a></li>
                    <li><a href="#contact" class="p3r-menu-item">CONTACT</a></li>
                </ul>
            </nav>
        </main>

        <footer class="p3r-footer-indicator">
            <p class="indicator-title">Navigate the Site</p>
            <div class="indicator-meta">
                <p class="indicator-sub">Command</p>
                <div class="indicator-line"></div>
            </div>
        </footer>

    </div>

    <script src="ts/dist/app.js"></script>
</body>
</html>
