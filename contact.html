<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anxin Xie - Portfolio</title>
    <meta name="description" content="Welkom op mijn portfolio. Een Persona 3 Reload geinspireerd webdesign project door Anxin Xie. Bekijk mijn frontend development werk en projecten.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body class="contact-body">
<section class="contact-contact p3r-contact contact-p3r-contact">
    <div class="contact-contact-container contact-p3r-card">

        <div class="contact-hud-top">
            <span>COMMUNICATION TERMINAL</span>
            <span>LV.01</span>
        </div>

        <h1 class="contact-p3r-title">ESTABLISH SOCIAL LINK</h1>

        <p class="contact-p3r-subtitle">
            SEND A TRANSMISSION FOR PROJECTS,
            COLLABORATIONS OR GENERAL INQUIRIES.
        </p>

        <form class="contact-contact-form contact-p3r-form">

            <div class="contact-input-group contact-p3r-input">
                <label>USER NAME</label>
                <input type="text" required>
            </div>

            <div class="contact-input-group contact-p3r-input">
                <label>E-MAIL ADDRESS</label>
                <input type="email" required>
            </div>

            <div class="contact-input-group contact-p3r-input">
                <label>SUBJECT</label>
                <input type="text">
            </div>

            <div class="contact-input-group contact-p3r-input">
                <label>MESSAGE DATA</label>
                <textarea rows="6" required></textarea>
            </div>

            <button type="submit" class="contact-p3r-btn">
                INITIATE CONTACT
            </button>

        </form>

        <div class="contact-contact-info contact-p3r-info">
            <h3>TRANSMISSION DATA</h3>

            <div class="contact-info-line">
                <span>MAIL</span>
                <p>cyberensick@gmail.com</p>
            </div>

            <div class="contact-info-line">
                <span>PHONE</span>
                <p>+31 6 43006160</p>
            </div>

            <div class="contact-info-line">
                <span>LOCATION</span>
                <p>Amsterdam, Netherlands</p>
            </div>

        </div>

    </div>
</section>

<nav class="p3r-nav-back">
    <a href="index.html" class="p3r-back-btn">« BACK TO MENU</a>
</nav>

    <footer class="p3r-footer-indicator">
        <p class="indicator-title">Establish a New Social Link</p>
        <div class="indicator-meta">
            <p class="indicator-sub">Contact</p>
            <div class="indicator-line"></div>
        </div>
    </footer>

    <script src="ts/dist/contact.js"></script>

</body>
</html>
